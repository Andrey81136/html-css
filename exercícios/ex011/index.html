<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mídias HTML</title>
</head>
<body>
  <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
  <picture>
    <source media="(max-width: 750px)" srcset="imagens-di/foto-p.png" type="image/png">
    <source media="(max-width: 1050px)" srcset="imagens-di/foto-m.png" type="image/png">
    <img src="imagens-di/foto-g.png" alt="A imagem flexível funciona">
  </picture>
  
  <h1>Reproduzindo áudios</h1>
  <p>vamos aprender a reproduzir áudios em HTML5</p>
  <audio src="midia/happy-mistake.mp3" controls></audio>
  
  <audio preload="metadata" autoplay controls>
    <source src="midia/guanacast-33.mp3" type="audio/mpeg">
    <source src="midia/guanacast-33.ogg" type="midia/ogg">
    <source src="midia/guanacast-33.wav" type="audio/wav">
    <p>infelizmente seu navegador não consegue reproduzir o áudio. <a href="midia/guanacast-33.mp3">Clique aqui para baixar o arquivo MP3</a></p>
  </audio>
</body>
</html>
